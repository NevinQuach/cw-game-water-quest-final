<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Water Quest</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div class="container">

    <div class="imageholder">
      <img src="img/water-can-transparent.png" alt="Water Can">
      <h1>Water Quest</h1>
    </div>

    <div class="gameinfo">

      <div class="gameholder">
        <p class="game-instructions">Collect 20 items to complete the game!</p>
      </div>

      <div class="statsholder">
        <p>Cans Collected: <span id="current-cans">0</span></p>
        <p>Time Left: <span id="timer">30</span>s</p>
      </div>

    </div>

    <div id="achievements" class="achievement"></div>
    <div class="game-grid"></div>
    <button id="start-game">Start Game</button>

  </div>

  <script src="script.js"></script>

  <footer class="footer-setup">
  
    <div class="footer-content">
      <h1> copyright information </h1>
      <p> &copy; 2026 Nevin Quach. All Rights Reserved. </p>
    </div>

    <div class="footer-content">
      <h1> charity:water information </h1>
      <a href="https://www.charitywater.org/home?utm_source=adwords&utm_medium=grant-cpc&utm_campaign=spring-acq-usrow&utm_term=GA_BOFU_Brand-PhraseExtended_GT_SRC_BRN_CVR_GEN_USA_MTD_V1&utm_content=branded&gad_source=1&gad_campaignid=23579930374&gbraid=0AAAAADNj5D-ChWOAiU3KvViR4Nn6g5c8g&gclid=EAIaIQobChMI_fzKz-ykkwMVel1HAR1huAtUEAAYASAAEgKQBvD_BwE"> official website </a>
      <a href="https://www.youtube.com/@charitywater/videos"> offical youtube channel </a>
      <a href="https://twitter.com/charitywater"> official twitter </a>
    </div>
  
  </footer>

</body>

</html>
