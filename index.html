<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Water Quest</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div class="container">

    <div class="imageholder">
      <img src="img/water-can-transparent.png" alt="Water Can">
      <h1>Water Quest</h1>
    </div>

    <div class="gameinfo">

      <div class="gameholder">
        <p class="game-instructions"></p>
      </div>

      <div class="statsholder">
        <p>Cans Collected: <span id="current-cans">0</span></p>
        <p>Time Left: <span id="timer">30</span>s</p>
      </div>

    </div>

    <div class="endgamemessageholder">
        <div id="endgamemessage"></div>
    </div>

    <div class="difficultyselection">
      <label for="difficulty">Select Difficulty:</label>

      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
    </div>

    <div id="achievements" class="achievement"></div>
    <div class="game-grid"></div>
    <button id="start-game">Start Game</button>

  </div>

  <script src="script.js"></script>

  <footer class="footer-setup">
  
    <div class="footer-content">
      <h1> copyright information </h1>
      <p> &copy; 2026 Nevin Quach. All Rights Reserved. </p>
    </div>

    <div class="footer-content">
      <h1> charity:water official websites </h1>
      <a href="https://www.charitywater.org/home"> official website </a>
      <a href="https://www.charitywater.org/the-spring/"> official donation page </a>
      <a href="https://www.youtube.com/@charitywater/videos"> offical youtube channel </a>
      <a href="https://twitter.com/charitywater"> official twitter </a>
      <a href="https://www.facebook.com/charitywater"> official facebook </a>
      <a href="https://www.instagram.com/charitywater/"> official instagram </a>
      <a href="https://www.snapchat.com/add/charitywater"> official snapchat </a>

    </div>
  
  </footer>

</body>

</html>
